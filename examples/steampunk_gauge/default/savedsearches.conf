# ── Example: Boiler Pressure ──
# Two zones: low warning (0-20) and high danger (80-100), both red.
[Steampunk Gauge - Boiler Pressure]
search = | makeresults | eval value=round(random() % 100), label="PRESSURE"
dispatch.earliest_time = -1m
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = steampunk_gauge.steampunk_gauge
display.visualizations.custom.steampunk_gauge.steampunk_gauge.valueField = value
display.visualizations.custom.steampunk_gauge.steampunk_gauge.labelField = label
display.visualizations.custom.steampunk_gauge.steampunk_gauge.maxValue = 100
display.visualizations.custom.steampunk_gauge.steampunk_gauge.minValue = 0
display.visualizations.custom.steampunk_gauge.steampunk_gauge.unit = PSI
display.visualizations.custom.steampunk_gauge.steampunk_gauge.decimals = 0
display.visualizations.custom.steampunk_gauge.steampunk_gauge.zone1min = 0
display.visualizations.custom.steampunk_gauge.steampunk_gauge.zone1max = 20
display.visualizations.custom.steampunk_gauge.steampunk_gauge.zone1color = #a52319
display.visualizations.custom.steampunk_gauge.steampunk_gauge.zone2min =
display.visualizations.custom.steampunk_gauge.steampunk_gauge.zone2max =
display.visualizations.custom.steampunk_gauge.steampunk_gauge.zone2color = #2e7d32
display.visualizations.custom.steampunk_gauge.steampunk_gauge.zone3min = 80
display.visualizations.custom.steampunk_gauge.steampunk_gauge.zone3max = 100
display.visualizations.custom.steampunk_gauge.steampunk_gauge.zone3color = #a52319
display.visualizations.custom.steampunk_gauge.steampunk_gauge.showReadout = true
display.visualizations.custom.steampunk_gauge.steampunk_gauge.showRivets = true
display.visualizations.custom.steampunk_gauge.steampunk_gauge.showWear = true
display.visualizations.custom.steampunk_gauge.steampunk_gauge.smoothness = 8

