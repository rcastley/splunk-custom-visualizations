[Liability Exposure Gauge - Live]
search = | makeresults count=6 \
| streamstats count as idx \
| eval category=case(idx=1,"Match Result",idx=2,"Goal Scorers",idx=3,"Correct Score",idx=4,"Over/Under",idx=5,"Both Teams Score",idx=6,"Corners & Cards") \
| eval threshold=case(idx=1,3000000,idx=2,2000000,idx=3,800000,idx=4,1500000,idx=5,1000000,idx=6,500000) \
| eval exposure=round(random() % threshold * 1.1) \
| table category exposure threshold \
| appendpipe [| stats count | where count=0 | eval _status="Awaiting liability data", category="", exposure=0, threshold=0]
dispatch.earliest_time = -1m
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = liability_gauge.liability_gauge
display.visualizations.custom.liability_gauge.liability_gauge.safeColor = #00cc66
display.visualizations.custom.liability_gauge.liability_gauge.warnColor = #ffaa00
display.visualizations.custom.liability_gauge.liability_gauge.dangerColor = #ff3333
display.visualizations.custom.liability_gauge.liability_gauge.warnThreshold = 70
display.visualizations.custom.liability_gauge.liability_gauge.showValues = true
display.visualizations.custom.liability_gauge.liability_gauge.showLabels = true
display.visualizations.custom.liability_gauge.liability_gauge.ringGap = 8
display.visualizations.custom.liability_gauge.liability_gauge.showPulse = true
