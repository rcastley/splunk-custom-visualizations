[Arcade Leaderboard - Live]
search = |sim flow query="data('arcade.logger.score', rollup='max').max(over='1d').top(count=10).publish()" |stats latest(_value) as score by player_name |sort - score |streamstats count as rank |appendpipe [| stats count | where count=0 | eval _status="INSERT COIN", rank=0, player_name="---", score=0]
dispatch.earliest_time = rt-1m
dispatch.latest_time = rt
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = arcade_leaderboard.arcade_leaderboard
display.visualizations.custom.arcade_leaderboard.arcade_leaderboard.title = HIGH SCORES
display.visualizations.custom.arcade_leaderboard.arcade_leaderboard.maxRows = 10
display.visualizations.custom.arcade_leaderboard.arcade_leaderboard.scoreDigits = 8
display.visualizations.custom.arcade_leaderboard.arcade_leaderboard.showScanlines = true
display.visualizations.custom.arcade_leaderboard.arcade_leaderboard.showGlow = true
display.visualizations.custom.arcade_leaderboard.arcade_leaderboard.titleColor = #00fff5
display.visualizations.custom.arcade_leaderboard.arcade_leaderboard.rankFieldName = rank
display.visualizations.custom.arcade_leaderboard.arcade_leaderboard.nameFieldName = player_name
display.visualizations.custom.arcade_leaderboard.arcade_leaderboard.scoreFieldName = score
