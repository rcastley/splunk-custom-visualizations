[Live Odds Ticker - World Cup]
search = | makeresults count=10 | streamstats count as idx \
| eval market=case(idx=1,"England to Win",idx=2,"France to Win",idx=3,"Draw",idx=4,"Mbappé First Goal",idx=5,"Kane Anytime Scorer",idx=6,"Over 2.5 Goals",idx=7,"Under 2.5 Goals",idx=8,"Both Teams to Score",idx=9,"England Clean Sheet",idx=10,"First Half Draw") \
| eval odds=case(idx=1,"2.50",idx=2,"3.10",idx=3,"3.40",idx=4,"6.50",idx=5,"2.80",idx=6,"1.85",idx=7,"2.00",idx=8,"1.75",idx=9,"3.25",idx=10,"2.10") \
| eval prev_odds=case(idx=1,"2.80",idx=2,"2.90",idx=3,"3.40",idx=4,"7.00",idx=5,"2.60",idx=6,"1.90",idx=7,"1.95",idx=8,"1.80",idx=9,"3.00",idx=10,"2.15") \
| eval bet_volume=case(idx=1,"45230",idx=2,"38100",idx=3,"12500",idx=4,"8900",idx=5,"22100",idx=6,"31000",idx=7,"18700",idx=8,"27500",idx=9,"9800",idx=10,"14200") \
| fields market odds prev_odds bet_volume \
| appendpipe [| stats count | where count=0 | eval _status="Awaiting odds data", market="", odds="0", prev_odds="0", bet_volume="0"]
dispatch.earliest_time = -1m
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = odds_ticker.odds_ticker
display.visualizations.custom.odds_ticker.odds_ticker.scrollSpeed = medium
display.visualizations.custom.odds_ticker.odds_ticker.bgColor = #0d0d1a
display.visualizations.custom.odds_ticker.odds_ticker.upColor = #00cc66
display.visualizations.custom.odds_ticker.odds_ticker.downColor = #ff4444
display.visualizations.custom.odds_ticker.odds_ticker.showVolume = true
display.visualizations.custom.odds_ticker.odds_ticker.itemSpacing = 40
display.visualizations.custom.odds_ticker.odds_ticker.fontSize = medium
