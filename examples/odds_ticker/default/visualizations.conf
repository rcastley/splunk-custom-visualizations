[odds_ticker]
label = Live Odds Ticker
description = Horizontal scrolling ticker showing real-time World Cup betting odds changes
default_height = 120
allow_user_selection = true
disabled = 0
search_fragment = | makeresults count=5 | streamstats count as idx | eval market=case(idx=1,"England to Win",idx=2,"France to Win",idx=3,"Draw",idx=4,"Over 2.5 Goals",idx=5,"Both Teams to Score"), odds=case(idx=1,"2.50",idx=2,"3.10",idx=3,"3.40",idx=4,"1.85",idx=5,"1.75"), prev_odds=case(idx=1,"2.80",idx=2,"2.90",idx=3,"3.40",idx=4,"1.90",idx=5,"1.80"), bet_volume=case(idx=1,"45230",idx=2,"38100",idx=3,"12500",idx=4,"31000",idx=5,"27500") | fields market odds prev_odds bet_volume
