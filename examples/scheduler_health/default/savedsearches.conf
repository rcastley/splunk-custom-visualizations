[Scheduler Health - Live]
search = index=_internal sourcetype=scheduler status=* | stats count as total, count(eval(status="skipped")) as skipped, count(eval(status="success")) as success, avg(run_time) as avg_runtime | eval skip_pct=if(total>0, round((skipped/total)*100,1), 0) | eval success_pct=if(total>0, round((success/total)*100,1), 0) | eval avg_runtime=round(avg_runtime,2) | table skip_pct success_pct avg_runtime total skipped | appendpipe [| stats count | where count=0 | eval _status="Awaiting scheduler data", skip_pct=0, success_pct=0, avg_runtime=0, total=0, skipped=0]
dispatch.earliest_time = -15m
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = scheduler_health.scheduler_health
display.visualizations.custom.scheduler_health.scheduler_health.colorTheme = default
display.visualizations.custom.scheduler_health.scheduler_health.showGlow = true
display.visualizations.custom.scheduler_health.scheduler_health.animSpeed = medium
display.visualizations.custom.scheduler_health.scheduler_health.runtimeThreshold = 30
