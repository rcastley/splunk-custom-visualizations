[Line Trend Chart - Electricity Demo]
search = | makeresults count=19 \
| streamstats count as idx \
| eval hour=case( \
    idx=1,"00:00", idx=2,"01:15", idx=3,"02:30", idx=4,"03:45", \
    idx=5,"05:00", idx=6,"06:15", idx=7,"07:30", idx=8,"08:45", \
    idx=9,"10:00", idx=10,"11:15", idx=11,"12:30", idx=12,"13:45", \
    idx=13,"15:00", idx=14,"16:15", idx=15,"17:30", idx=16,"18:45", \
    idx=17,"20:00", idx=18,"21:15", idx=19,"23:45") \
| eval consumption=case( \
    idx=1,260, idx=2,240, idx=3,220, idx=4,230, \
    idx=5,240, idx=6,250, idx=7,280, idx=8,460, \
    idx=9,500, idx=10,380, idx=11,390, idx=12,370, \
    idx=13,380, idx=14,400, idx=15,410, idx=16,600, \
    idx=17,610, idx=18,780, idx=19,400) \
| eval generation=case( \
    idx=1,0, idx=2,0, idx=3,0, idx=4,0, \
    idx=5,0, idx=6,0, idx=7,50, idx=8,350, \
    idx=9,400, idx=10,380, idx=11,360, idx=12,350, \
    idx=13,340, idx=14,380, idx=15,450, idx=16,750, \
    idx=17,800, idx=18,680, idx=19,0) \
| eval zone=case( \
    idx>=7 AND idx<=9, "Morning Peak", \
    idx>=16 AND idx<=18, "Evening Peak", \
    1=1, "") \
| table hour consumption generation zone
dispatch.earliest_time = -60m
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = line_trend_chart.line_trend_chart
display.visualizations.custom.line_trend_chart.line_trend_chart.title = Distribution of Electricity
display.visualizations.custom.line_trend_chart.line_trend_chart.xField = hour
display.visualizations.custom.line_trend_chart.line_trend_chart.seriesFields = consumption,generation
display.visualizations.custom.line_trend_chart.line_trend_chart.zoneField = zone
display.visualizations.custom.line_trend_chart.line_trend_chart.lineStyle = smooth
display.visualizations.custom.line_trend_chart.line_trend_chart.showArea = false
display.visualizations.custom.line_trend_chart.line_trend_chart.showPoints = true
display.visualizations.custom.line_trend_chart.line_trend_chart.showTooltip = true
display.visualizations.custom.line_trend_chart.line_trend_chart.showLegend = true
display.visualizations.custom.line_trend_chart.line_trend_chart.legendPosition = top
display.visualizations.custom.line_trend_chart.line_trend_chart.yUnit = W
display.visualizations.custom.line_trend_chart.line_trend_chart.maxY = 0
display.visualizations.custom.line_trend_chart.line_trend_chart.colorTheme = warm
display.visualizations.custom.line_trend_chart.line_trend_chart.colorOverrides = consumption:#67a348, generation:#ff4500
display.visualizations.custom.line_trend_chart.line_trend_chart.zoneLineColor = #ff4500
display.visualizations.custom.line_trend_chart.line_trend_chart.zoneColor = rgba(255,180,180,0.3)
display.visualizations.custom.line_trend_chart.line_trend_chart.zoneColorOverrides =
