[Splunk Status Board - Live]
search = index=_internal sourcetype=splunkd component=* log_level=* | stats count(eval(log_level="ERROR")) as errors, count(eval(log_level="WARN")) as warns by component | eval status=if(errors>0, "critical", if(warns>0, "warning", "ok")) | eval health_score=case(status="critical", 90, status="warning", 60, 1=1, 10) | sort - errors - warns | head 20 | table component status errors warns health_score | appendpipe [| stats count | where count=0 | eval _status="Awaiting component data", component="", status="ok", errors=0, warns=0, health_score=0]
dispatch.earliest_time = -15m
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = splunk_status_board.splunk_status_board
display.visualizations.custom.splunk_status_board.splunk_status_board.colorTheme = default
display.visualizations.custom.splunk_status_board.splunk_status_board.showGlow = true
display.visualizations.custom.splunk_status_board.splunk_status_board.warningThreshold = 50
display.visualizations.custom.splunk_status_board.splunk_status_board.criticalThreshold = 80
display.visualizations.custom.splunk_status_board.splunk_status_board.showCounts = true
display.visualizations.custom.splunk_status_board.splunk_status_board.animSpeed = medium
display.visualizations.custom.splunk_status_board.splunk_status_board.columns = 3
