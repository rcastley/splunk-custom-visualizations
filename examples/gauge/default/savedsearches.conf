# ── Example: CPU Usage Arc Gauge ──
[Gauge - CPU Usage]
search = | makeresults | eval value=round(random() % 100)
dispatch.earliest_time = -1m
dispatch.latest_time = now
display.visualizations.type = custom
display.visualizations.custom.type = gauge.gauge
display.visualizations.custom.gauge.gauge.field = value
display.visualizations.custom.gauge.gauge.maxValue = 100
display.visualizations.custom.gauge.gauge.unit = %
display.visualizations.custom.gauge.gauge.label = CPU USAGE
display.visualizations.custom.gauge.gauge.colorScheme = green_red
display.visualizations.custom.gauge.gauge.displayMode = arc

