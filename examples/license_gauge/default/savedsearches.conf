[License Gauge - Daily Usage]
search = | rest /services/licenser/pools | stats sum(used_bytes) as used_bytes | join type=outer [| rest /services/licenser/groups | search is_active=1 | eval quota_bytes=if(quota>=9999999999999,0,quota) | stats sum(quota_bytes) as quota_bytes] | eval used_gb=round(used_bytes/1024/1024/1024,2) | eval quota_gb=round(quota_bytes/1024/1024/1024,2) | table used_gb quota_gb | appendpipe [| stats count | where count=0 | eval _status="Awaiting license data", used_gb=0, quota_gb=0]
dispatch.earliest_time = -1m
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = license_gauge.license_gauge
display.visualizations.custom.license_gauge.license_gauge.colorTheme = default
display.visualizations.custom.license_gauge.license_gauge.showGlow = true
display.visualizations.custom.license_gauge.license_gauge.warningThreshold = 80
display.visualizations.custom.license_gauge.license_gauge.criticalThreshold = 90
display.visualizations.custom.license_gauge.license_gauge.animSpeed = medium
display.visualizations.custom.license_gauge.license_gauge.showLabel = true
display.visualizations.custom.license_gauge.license_gauge.usedField = used_gb
display.visualizations.custom.license_gauge.license_gauge.quotaField = quota_gb
display.visualizations.custom.license_gauge.license_gauge.unit = GB
