<form class="splunk-formatter-section" section-label="Gauge Settings">
    <splunk-control-group label="Colour Theme" help="Visual theme for the gauge">
        <splunk-select name="{{VIZ_NAMESPACE}}.colorTheme" value="default">
            <option value="default">Default</option>
            <option value="dark">Dark</option>
            <option value="neon">Neon</option>
        </splunk-select>
    </splunk-control-group>
    <splunk-control-group label="Animation Speed" help="Speed of particles along the arc">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.animSpeed" value="medium">
            <option value="slow">Slow</option>
            <option value="medium">Medium</option>
            <option value="fast">Fast</option>
        </splunk-radio-input>
    </splunk-control-group>
    <splunk-control-group label="Show Glow Effect" help="Glowing highlight when usage is high">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.showGlow" value="true">
            <option value="true">Yes</option>
            <option value="false">No</option>
        </splunk-radio-input>
    </splunk-control-group>
    <splunk-control-group label="Show Label" help="Display LICENSE USAGE title">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.showLabel" value="true">
            <option value="true">Yes</option>
            <option value="false">No</option>
        </splunk-radio-input>
    </splunk-control-group>
</form>
<form class="splunk-formatter-section" section-label="Thresholds">
    <splunk-control-group label="Warning Threshold" help="Percentage at which the gauge turns yellow (0-100)">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.warningThreshold" value="80">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Critical Threshold" help="Percentage at which the gauge turns red (0-100)">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.criticalThreshold" value="90">
        </splunk-text-input>
    </splunk-control-group>
</form>
<form class="splunk-formatter-section" section-label="Field Mapping">
    <splunk-control-group label="Used Field" help="SPL field name for the used value">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.usedField" value="used_gb">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Quota Field" help="SPL field name for the quota value">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.quotaField" value="quota_gb">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Unit" help="Display unit label (e.g. GB, TB, MB)">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.unit" value="GB">
        </splunk-text-input>
    </splunk-control-group>
</form>
