[Resource Gauge - Live]
search = index=_introspection sourcetype=splunk_resource_usage component=hostwide | stats latest(data.cpu_user_pct) as cpu_user, latest(data.cpu_system_pct) as cpu_sys, latest(data.mem_used) as mem_used, latest(data.mem) as mem_total, latest(data.swap_used) as swap_used, latest(data.swap) as swap_total by host | eval cpu_pct=round(cpu_user+cpu_sys, 1) | eval mem_pct=if(mem_total>0, round((mem_used/mem_total)*100, 1), 0) | eval disk_pct=if(swap_total>0, round((swap_used/swap_total)*100, 1), 0) | head 1 | table cpu_pct mem_pct disk_pct | appendpipe [| stats count | where count=0 | eval _status="Awaiting resource data", cpu_pct=0, mem_pct=0, disk_pct=0]
dispatch.earliest_time = -1m
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = resource_gauge.resource_gauge
display.visualizations.custom.resource_gauge.resource_gauge.colorTheme = default
display.visualizations.custom.resource_gauge.resource_gauge.showGlow = true
display.visualizations.custom.resource_gauge.resource_gauge.warningThreshold = 70
display.visualizations.custom.resource_gauge.resource_gauge.criticalThreshold = 85
display.visualizations.custom.resource_gauge.resource_gauge.animSpeed = medium
display.visualizations.custom.resource_gauge.resource_gauge.showLabels = true
display.visualizations.custom.resource_gauge.resource_gauge.cpuField = cpu_pct
display.visualizations.custom.resource_gauge.resource_gauge.memField = mem_pct
display.visualizations.custom.resource_gauge.resource_gauge.diskField = disk_pct
