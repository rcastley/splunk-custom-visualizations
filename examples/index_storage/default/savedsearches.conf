[Index Storage - Live]
search = | rest /services/data/indexes | where totalEventCount>0 | eval sizeGB=round(currentDBSizeMB/1024,2) | eval maxGB=round(maxTotalDataSizeMB/1024,2) | stats sum(sizeGB) as sizeGB, max(maxGB) as maxGB, sum(hotBucketCount) as hotBuckets, sum(warmBucketCount) as warmBuckets, sum(coldBucketCount) as coldBuckets by title | eval totalBuckets=hotBuckets+warmBuckets+coldBuckets | eval hotGB=if(totalBuckets>0, round(sizeGB*(hotBuckets/totalBuckets),2), 0) | eval warmGB=if(totalBuckets>0, round(sizeGB*(warmBuckets/totalBuckets),2), 0) | eval coldGB=if(totalBuckets>0, round(sizeGB*(coldBuckets/totalBuckets),2), 0) | table title sizeGB maxGB hotGB warmGB coldGB | sort -sizeGB | appendpipe [| stats count | where count=0 | eval _status="Awaiting index data", title="", sizeGB=0, maxGB=0, hotGB=0, warmGB=0, coldGB=0]
dispatch.earliest_time = -1m
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = index_storage.index_storage
display.visualizations.custom.index_storage.index_storage.colorTheme = default
display.visualizations.custom.index_storage.index_storage.showGlow = true
display.visualizations.custom.index_storage.index_storage.animSpeed = medium
display.visualizations.custom.index_storage.index_storage.cellSize = auto
display.visualizations.custom.index_storage.index_storage.sortBy = size
