[wc_bracket]
label = World Cup Bracket
description = Tournament bracket visualization with betting volume pulse/glow on match cards
default_height = 600
allow_user_selection = true
disabled = 0
search_fragment = | makeresults count=15 | streamstats count as pos | eval round=case(pos<=8,"R16",pos<=12,"QF",pos<=14,"SF",pos<=15,"F"), position=case(round="R16",pos,round="QF",pos-8,round="SF",pos-12,round="F",1), team1="Team A", team2="Team B", volume=round(random()%15000), winner=""
