[indexing_pipeline_flow]
label = Indexing Pipeline Flow
description = Animated visualization of Splunk indexing pipeline queues with glass tube fill levels and flow particles
default_height = 350
allow_user_selection = true
disabled = 0
search_fragment = index=_internal source=*metrics.log group=queue | stats avg(current_size_kb) as avg_size, avg(max_size_kb) as capacity by name | eval fill_pct=round((avg_size/capacity)*100,1) | table name fill_pct avg_size capacity
