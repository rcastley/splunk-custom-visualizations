[Indexing Pipeline Flow - Live]
search = index=_internal source=*metrics.log group=queue name IN (parsingQueue, mergingQueue, typingQueue, indexQueue) | stats avg(current_size_kb) as avg_size, avg(max_size_kb) as capacity by name | eval fill_pct=round((avg_size/capacity)*100,1) | table name fill_pct avg_size capacity | appendpipe [| stats count | where count=0 | eval _status="Awaiting pipeline data", name="parsingQueue", fill_pct=0, avg_size=0, capacity=0]
dispatch.earliest_time = -5m
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = indexing_pipeline_flow.indexing_pipeline_flow
display.visualizations.custom.indexing_pipeline_flow.indexing_pipeline_flow.animSpeed = medium
display.visualizations.custom.indexing_pipeline_flow.indexing_pipeline_flow.colorTheme = default
display.visualizations.custom.indexing_pipeline_flow.indexing_pipeline_flow.showLabels = true
display.visualizations.custom.indexing_pipeline_flow.indexing_pipeline_flow.showValues = true
display.visualizations.custom.indexing_pipeline_flow.indexing_pipeline_flow.warningThreshold = 70
display.visualizations.custom.indexing_pipeline_flow.indexing_pipeline_flow.criticalThreshold = 85
display.visualizations.custom.indexing_pipeline_flow.indexing_pipeline_flow.showGlow = true
