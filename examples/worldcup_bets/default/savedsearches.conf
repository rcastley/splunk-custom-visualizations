[World Cup Bets Pulse - Live]
search = | makeresults \
| eval bets_per_minute=round(random() % 10000), match_name="ENGLAND vs FRANCE", peak_bpm=12450, prev_bpm=round(random() % 10000) \
| appendpipe [| stats count | where count=0 | eval _status="Awaiting betting data", bets_per_minute=0, match_name="", peak_bpm=0, prev_bpm=0]
dispatch.earliest_time = -1m
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = worldcup_bets.worldcup_bets
display.visualizations.custom.worldcup_bets.worldcup_bets.pitchStyle = dark
display.visualizations.custom.worldcup_bets.worldcup_bets.colorLow = #0088ff
display.visualizations.custom.worldcup_bets.worldcup_bets.colorMid = #ffcc00
display.visualizations.custom.worldcup_bets.worldcup_bets.colorHigh = #ff3333
display.visualizations.custom.worldcup_bets.worldcup_bets.maxBPM = 10000
display.visualizations.custom.worldcup_bets.worldcup_bets.animationSpeed = medium
display.visualizations.custom.worldcup_bets.worldcup_bets.showParticles = true
display.visualizations.custom.worldcup_bets.worldcup_bets.showBreakdown = true
display.visualizations.custom.worldcup_bets.worldcup_bets.showPeak = true
display.visualizations.custom.worldcup_bets.worldcup_bets.showPitch = true
display.visualizations.custom.worldcup_bets.worldcup_bets.bpmField = bets_per_minute
