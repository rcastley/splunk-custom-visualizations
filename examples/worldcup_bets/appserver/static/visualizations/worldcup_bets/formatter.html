<form class="splunk-formatter-section" section-label="Gauge Settings">
    <splunk-control-group label="BPM Field" help="Column name containing bets per minute value">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.bpmField" value="bets_per_minute">
        </splunk-text-input>
    </splunk-control-group>

    <splunk-control-group label="Max BPM" help="Maximum value for the gauge scale">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.maxBPM" value="10000">
        </splunk-text-input>
    </splunk-control-group>

    <splunk-control-group label="Animation Speed" help="Speed of pulse and particle animations">
        <splunk-select name="{{VIZ_NAMESPACE}}.animationSpeed" value="medium">
            <option value="slow">Slow</option>
            <option value="medium">Medium</option>
            <option value="fast">Fast</option>
        </splunk-select>
    </splunk-control-group>

    <splunk-control-group label="Show Peak" help="Display peak bets per minute indicator">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.showPeak" value="true">
            <option value="true">Yes</option>
            <option value="false">No</option>
        </splunk-radio-input>
    </splunk-control-group>
</form>

<form class="splunk-formatter-section" section-label="Appearance">
    <splunk-control-group label="Pitch Style" help="Background pitch theme">
        <splunk-select name="{{VIZ_NAMESPACE}}.pitchStyle" value="dark">
            <option value="classic">Classic Green</option>
            <option value="dark">Dark</option>
            <option value="neon">Neon</option>
        </splunk-select>
    </splunk-control-group>

    <splunk-control-group label="Low Volume Color" help="Color for low betting volume">
        <splunk-color-picker name="{{VIZ_NAMESPACE}}.colorLow" type="custom" value="#0088ff">
            <splunk-color>#0088ff</splunk-color>
            <splunk-color>#00ccff</splunk-color>
            <splunk-color>#0066cc</splunk-color>
            <splunk-color>#00ff88</splunk-color>
        </splunk-color-picker>
    </splunk-control-group>

    <splunk-control-group label="Mid Volume Color" help="Color for mid betting volume">
        <splunk-color-picker name="{{VIZ_NAMESPACE}}.colorMid" type="custom" value="#ffcc00">
            <splunk-color>#ffcc00</splunk-color>
            <splunk-color>#ff9900</splunk-color>
            <splunk-color>#ffff00</splunk-color>
            <splunk-color>#ff6600</splunk-color>
        </splunk-color-picker>
    </splunk-control-group>

    <splunk-control-group label="High Volume Color" help="Color for high betting volume">
        <splunk-color-picker name="{{VIZ_NAMESPACE}}.colorHigh" type="custom" value="#ff3333">
            <splunk-color>#ff3333</splunk-color>
            <splunk-color>#ff0000</splunk-color>
            <splunk-color>#cc0000</splunk-color>
            <splunk-color>#ff0066</splunk-color>
        </splunk-color-picker>
    </splunk-control-group>

    <splunk-control-group label="Show Pitch" help="Toggle football pitch background">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.showPitch" value="true">
            <option value="true">Yes</option>
            <option value="false">No</option>
        </splunk-radio-input>
    </splunk-control-group>

    <splunk-control-group label="Show Particles" help="Toggle particle convergence effects on volume spikes">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.showParticles" value="true">
            <option value="true">Yes</option>
            <option value="false">No</option>
        </splunk-radio-input>
    </splunk-control-group>

    <splunk-control-group label="Show Volume Bar" help="Toggle volume breakdown bar at bottom">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.showBreakdown" value="true">
            <option value="true">Yes</option>
            <option value="false">No</option>
        </splunk-radio-input>
    </splunk-control-group>
</form>
