[Market Depth Donut - Live]
search = | makeresults count=15 \
| streamstats count as idx \
| eval category=case(idx<=3,"Match Result",idx<=7,"Goal Scorer",idx<=9,"Over/Under",idx<=11,"Both Teams Score",idx<=13,"Corners",idx<=15,"Cards") \
| eval market=case(idx=1,"England Win",idx=2,"France Win",idx=3,"Draw",idx=4,"Kane First Goal",idx=5,"Mbappe First Goal",idx=6,"Kane Anytime",idx=7,"Mbappe Anytime",idx=8,"Over 2.5",idx=9,"Under 2.5",idx=10,"Yes",idx=11,"No",idx=12,"Over 10.5",idx=13,"Under 10.5",idx=14,"Over 3.5",idx=15,"Under 3.5") \
| eval volume=case(idx=1,12000,idx=2,9500,idx=3,4200,idx=4,3800,idx=5,4100,idx=6,6200,idx=7,5800,idx=8,8900,idx=9,5400,idx=10,7200,idx=11,3100,idx=12,2800,idx=13,2200,idx=14,1900,idx=15,1500) \
| table category, market, volume \
| appendpipe [| stats count | where count=0 | eval _status="Awaiting betting data", category="", market="", volume=0]
dispatch.earliest_time = -1m
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = market_donut.market_donut
display.visualizations.custom.market_donut.market_donut.palette = vibrant
display.visualizations.custom.market_donut.market_donut.showLabels = true
display.visualizations.custom.market_donut.market_donut.showCenter = true
display.visualizations.custom.market_donut.market_donut.showInnerLabels = false
display.visualizations.custom.market_donut.market_donut.gapAngle = 1
display.visualizations.custom.market_donut.market_donut.ringRatio = 0.6
display.visualizations.custom.market_donut.market_donut.outerThickness = 0
