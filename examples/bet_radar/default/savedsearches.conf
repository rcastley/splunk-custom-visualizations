[Bet Type Radar Chart - Live]
search = | makeresults count=8 \
| streamstats count as idx \
| eval bet_type=case(idx=1,"Match Result",idx=2,"First Goal Scorer",idx=3,"Correct Score",idx=4,"Over/Under Goals",idx=5,"Both Teams Score",idx=6,"Corners",idx=7,"Cards",idx=8,"Half-Time Result") \
| eval volume=case(idx=1,8500,idx=2,4200,idx=3,2100,idx=4,6800,idx=5,5400,idx=6,1800,idx=7,1200,idx=8,3600) \
| eval avg_volume=case(idx=1,7200,idx=2,3800,idx=3,2500,idx=4,6100,idx=5,4900,idx=6,2200,idx=7,1500,idx=8,3100) \
| table bet_type volume avg_volume
dispatch.earliest_time = -1m
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = bet_radar.bet_radar
display.visualizations.custom.bet_radar.bet_radar.fillColor = #0088ff
display.visualizations.custom.bet_radar.bet_radar.avgColor = #ff8800
display.visualizations.custom.bet_radar.bet_radar.showAverage = true
display.visualizations.custom.bet_radar.bet_radar.showValues = true
display.visualizations.custom.bet_radar.bet_radar.showGrid = true
display.visualizations.custom.bet_radar.bet_radar.maxValue = 0
display.visualizations.custom.bet_radar.bet_radar.fillOpacity = 0.25
