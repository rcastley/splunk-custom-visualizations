[Forwarder Heatmap - Live]
search = index=_internal sourcetype=splunkd group=tcpin_connections | stats max(_time) as last_seen, avg(tcp_KBps) as avg_kbps, avg(tcp_eps) as eps by hostname | eval mins_ago=round((now()-last_seen)/60,1) | eval eps=round(eps,1) | rename hostname as host | table host mins_ago eps | appendpipe [| stats count | where count=0 | eval _status="Awaiting forwarder data", host="", mins_ago=0, eps=0]
dispatch.earliest_time = -5m
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = forwarder_heatmap.forwarder_heatmap
display.visualizations.custom.forwarder_heatmap.forwarder_heatmap.colorTheme = default
display.visualizations.custom.forwarder_heatmap.forwarder_heatmap.showGlow = true
display.visualizations.custom.forwarder_heatmap.forwarder_heatmap.warningThreshold = 5
display.visualizations.custom.forwarder_heatmap.forwarder_heatmap.criticalThreshold = 15
display.visualizations.custom.forwarder_heatmap.forwarder_heatmap.showEps = true
display.visualizations.custom.forwarder_heatmap.forwarder_heatmap.animSpeed = medium
display.visualizations.custom.forwarder_heatmap.forwarder_heatmap.cellSize = auto
display.visualizations.custom.forwarder_heatmap.forwarder_heatmap.sortBy = status
