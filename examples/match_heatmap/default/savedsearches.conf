[Match Heatmap Grid - Live]
search = | makeresults count=24 \
| streamstats count as idx \
| eval match=case(idx<=6,"ENG vs FRA",idx<=12,"BRA vs GER",idx<=18,"ARG vs NED",idx<=24,"ESP vs POR") \
| eval slot_idx=((idx-1) % 6) \
| eval time_slot=case(slot_idx==0,"0-15",slot_idx==1,"15-30",slot_idx==2,"30-45",slot_idx==3,"45-60",slot_idx==4,"60-75",slot_idx==5,"75-90") \
| eval volume=round(random() % 15000) \
| table match, time_slot, volume \
| appendpipe [| stats count | where count=0 | eval _status="Awaiting betting data", match="", time_slot="", volume=0]
dispatch.earliest_time = -1m
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = match_heatmap.match_heatmap
display.visualizations.custom.match_heatmap.match_heatmap.colorLow = #0a1628
display.visualizations.custom.match_heatmap.match_heatmap.colorMid = #1a6baa
display.visualizations.custom.match_heatmap.match_heatmap.colorHigh = #ff3333
display.visualizations.custom.match_heatmap.match_heatmap.showValues = false
display.visualizations.custom.match_heatmap.match_heatmap.cellRadius = 4
display.visualizations.custom.match_heatmap.match_heatmap.cellGap = 3
display.visualizations.custom.match_heatmap.match_heatmap.labelWidth = 120
