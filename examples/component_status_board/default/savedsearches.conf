[Component Status Board - Live]
search = index=_internal sourcetype=splunkd log_level=* component=* | stats count(eval(log_level="ERROR")) as errors count(eval(log_level="WARN")) as warns latest(_time) as last_seen by component | eval status=if(errors>0,"critical",if(warns>0,"warning","ok")) | sort -errors -warns
dispatch.earliest_time = -15m
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = component_status_board.component_status_board
display.visualizations.custom.component_status_board.component_status_board.componentField = component
display.visualizations.custom.component_status_board.component_status_board.errorsField = errors
display.visualizations.custom.component_status_board.component_status_board.warningsField = warns
display.visualizations.custom.component_status_board.component_status_board.statusField = status
display.visualizations.custom.component_status_board.component_status_board.title = COMPONENT STATUS
display.visualizations.custom.component_status_board.component_status_board.sortOrder = severity
display.visualizations.custom.component_status_board.component_status_board.showLegend = true
display.visualizations.custom.component_status_board.component_status_board.showGlow = true
display.visualizations.custom.component_status_board.component_status_board.mutedOk = true
