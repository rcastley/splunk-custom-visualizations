[component_status_board]
label = Component Status Board
description = NOC-style grid of status tiles showing component health with error and warning counts
default_height = 400
allow_user_selection = true
disabled = 0
search_fragment = | stats count(eval(log_level="ERROR")) as errors count(eval(log_level="WARN")) as warns by component | eval status=if(errors>0,"critical",if(warns>0,"warning","ok"))
