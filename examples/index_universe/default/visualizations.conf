[index_universe]
label = Index Universe
description = Orbital bubble chart of Splunk indexes — bubble size is disk usage, color is event count, orbit is retention age
default_height = 500
allow_user_selection = true
disabled = 0
search_fragment = | rest /services/data/indexes | table title totalEventCount currentDBSizeMB maxTotalDataSizeMB frozenTimePeriodInSecs | eval retention_days=round(frozenTimePeriodInSecs/86400,0)
