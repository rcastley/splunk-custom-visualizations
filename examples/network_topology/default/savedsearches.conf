search = | makeresults count=1 \
| eval raw="load-balancer-01,web-server-01,8,ok;load-balancer-01,web-server-02,7,ok;load-balancer-02,web-server-03,6,ok;web-server-01,api-gateway-01,5,ok;web-server-02,api-gateway-01,4,ok;web-server-03,api-gateway-02,5,warning;api-gateway-01,auth-service,3,ok;api-gateway-01,user-service,4,ok;api-gateway-02,order-service,6,ok;api-gateway-02,payment-service,5,critical;order-service,db-primary,7,ok;payment-service,db-primary,8,ok;db-primary,db-replica-01,9,ok;db-primary,db-replica-02,9,ok;user-service,cache-redis-01,4,warning" \
| makemv delim=";" raw \
| mvexpand raw \
| rex field=raw "(?<source>[^,]+),(?<dest>[^,]+),(?<weight>[^,]+),(?<status>[^,]+)" \
| fields source dest weight status \
| appendpipe [| stats count | where count=0 | eval _status="Awaiting network data", source="", dest="", weight="0", status="ok"]
