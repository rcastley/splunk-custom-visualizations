# ── Example: Distance Travelled ──
[Steampunk Odometer - Distance]
search = | makeresults | eval value=round(random() % 100000), label="DISTANCE"
dispatch.earliest_time = -1m
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = steampunk_odometer.steampunk_odometer
display.visualizations.custom.steampunk_odometer.steampunk_odometer.valueField = value
display.visualizations.custom.steampunk_odometer.steampunk_odometer.labelField = label
display.visualizations.custom.steampunk_odometer.steampunk_odometer.digits = 6
display.visualizations.custom.steampunk_odometer.steampunk_odometer.decimals = 0
display.visualizations.custom.steampunk_odometer.steampunk_odometer.unit = km
display.visualizations.custom.steampunk_odometer.steampunk_odometer.showRivets = true
display.visualizations.custom.steampunk_odometer.steampunk_odometer.showWear = true
display.visualizations.custom.steampunk_odometer.steampunk_odometer.digitSpacing = 50
display.visualizations.custom.steampunk_odometer.steampunk_odometer.smoothness = 8

