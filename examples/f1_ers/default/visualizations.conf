[f1_ers]
label = F1 ERS Energy
description = Energy Recovery System battery bar with deploy mode, harvest and deploy stats
default_height = 200
allow_user_selection = true
disabled = 0
search_fragment = | eval driver=host | stats latest(ers_store_energy) as ers_store_energy latest(ers_deploy_mode) as ers_deploy_mode latest(ers_harvested_this_lap_mguk) as ers_harvested_mguk latest(ers_harvested_this_lap_mguh) as ers_harvested_mguh latest(ers_deployed_this_lap) as ers_deployed by driver | head 1
