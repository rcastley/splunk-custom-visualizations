name: Lint

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '.markdownlint-cli2.jsonc'
      - '.github/workflows/lint.yml'
  pull_request:
    paths:
      - '**/*.md'
      - '.markdownlint-cli2.jsonc'
      - '.github/workflows/lint.yml'

jobs:
  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run markdownlint-cli2
        run: npx --yes markdownlint-cli2
