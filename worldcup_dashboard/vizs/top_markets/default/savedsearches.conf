[Top Markets - Logins by Country]
search = index=prod_session action=login brand IN (paddypower, betfair)\
| eval country = coalesce(country, "International")\
| stats count by country\
| sort - count
dispatch.earliest_time = -60m
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = worldcup_dashboard.top_markets
display.visualizations.custom.worldcup_dashboard.top_markets.countryField = country
display.visualizations.custom.worldcup_dashboard.top_markets.valueField = count
display.visualizations.custom.worldcup_dashboard.top_markets.title = Customer Reach · Top Markets
display.visualizations.custom.worldcup_dashboard.top_markets.tagText = by active users
display.visualizations.custom.worldcup_dashboard.top_markets.topN = 6
display.visualizations.custom.worldcup_dashboard.top_markets.showShare = true
display.visualizations.custom.worldcup_dashboard.top_markets.abbreviate = true
display.visualizations.custom.worldcup_dashboard.top_markets.barColor1 = #0285FF
display.visualizations.custom.worldcup_dashboard.top_markets.barColor2 = #CCE5FF
display.visualizations.custom.worldcup_dashboard.top_markets.valueColor = #ffffff
display.visualizations.custom.worldcup_dashboard.top_markets.tagColor = #F8CD4B
display.visualizations.custom.worldcup_dashboard.top_markets.fillColor = transparent
display.visualizations.custom.worldcup_dashboard.top_markets.showBorder = true
display.visualizations.custom.worldcup_dashboard.top_markets.borderColor = #2A3566
display.visualizations.custom.worldcup_dashboard.top_markets.cornerRadius = 16
