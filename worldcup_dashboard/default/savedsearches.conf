[Category Breakdown - SBG Cashout]
search = | makeresults count=7 | streamstats count as r\
| eval category=mvindex(split("SUCCESS,NOT_ELIGIBLE,MARKET_SUSPENDED,GENERAL_FAILURE,INVALID_QUOTE,BET_CLOSED,INVALID_RUNNER",","),r-1)\
| eval count=tonumber(mvindex(split("4800,72,21,11,7,5,3",","),r-1)) + (random()%21) - 10\
| eval count=if(count<0,0,count)\
| eval delta=if(category="SUCCESS",round((random()%12)/10,1),null())\
| fields category count delta
dispatch.earliest_time = -60m
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = worldcup_dashboard.category_breakdown
display.visualizations.custom.worldcup_dashboard.category_breakdown.categoryField = category
display.visualizations.custom.worldcup_dashboard.category_breakdown.valueField = count
display.visualizations.custom.worldcup_dashboard.category_breakdown.deltaField = delta
display.visualizations.custom.worldcup_dashboard.category_breakdown.primaryCategory = SUCCESS
display.visualizations.custom.worldcup_dashboard.category_breakdown.headlineLabel = cashout success rate
display.visualizations.custom.worldcup_dashboard.category_breakdown.headlineSuffix = %
display.visualizations.custom.worldcup_dashboard.category_breakdown.headlineColor = #ffffff
display.visualizations.custom.worldcup_dashboard.category_breakdown.abbreviate = true
display.visualizations.custom.worldcup_dashboard.category_breakdown.deltaSuffix = pt
