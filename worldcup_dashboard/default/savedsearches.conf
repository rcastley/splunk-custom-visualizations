# Saved searches are merged here by vizs/build.sh

[Single Value + Delta - Active Customers]
search = index=prod_session action=login brand IN (paddypower, betfair)\
| timechart span=5m dc(customer_id) as value\
| eventstats avg(eval(if(_time < relative_time(now(), "-90m"), value, null()))) as baseline\
| eval delta = round(value / baseline, 1)
dispatch.earliest_time = -3h
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = worldcup_dashboard.single_value_delta
display.visualizations.custom.worldcup_dashboard.single_value_delta.field = value
display.visualizations.custom.worldcup_dashboard.single_value_delta.deltaField = delta
display.visualizations.custom.worldcup_dashboard.single_value_delta.title = Active Customers
display.visualizations.custom.worldcup_dashboard.single_value_delta.align = left
display.visualizations.custom.worldcup_dashboard.single_value_delta.valuePrefix =
display.visualizations.custom.worldcup_dashboard.single_value_delta.valueSuffix = K
display.visualizations.custom.worldcup_dashboard.single_value_delta.groupThousands = true
display.visualizations.custom.worldcup_dashboard.single_value_delta.valueColor = #ffffff
display.visualizations.custom.worldcup_dashboard.single_value_delta.colorMode = fixed
display.visualizations.custom.worldcup_dashboard.single_value_delta.threshold1 =
display.visualizations.custom.worldcup_dashboard.single_value_delta.bandColor1 = #D5225D
display.visualizations.custom.worldcup_dashboard.single_value_delta.threshold2 =
display.visualizations.custom.worldcup_dashboard.single_value_delta.bandColor2 = #F8784B
display.visualizations.custom.worldcup_dashboard.single_value_delta.threshold3 =
display.visualizations.custom.worldcup_dashboard.single_value_delta.bandColor3 = #F8CD4B
display.visualizations.custom.worldcup_dashboard.single_value_delta.threshold4 =
display.visualizations.custom.worldcup_dashboard.single_value_delta.bandColor4 = #A7D94B
