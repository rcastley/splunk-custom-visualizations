# Saved searches are merged here by vizs/build.sh

[Single Value + Delta - Active Customers]
search = index=prod_session action=login brand IN (paddypower, betfair)\
| timechart span=5m dc(customer_id) as value\
| eventstats avg(eval(if(_time < relative_time(now(), "-90m"), value, null()))) as baseline\
| eval delta = round(value / baseline, 1)
dispatch.earliest_time = -3h
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = worldcup_dashboard.single_value_delta
display.visualizations.custom.worldcup_dashboard.single_value_delta.field = value
display.visualizations.custom.worldcup_dashboard.single_value_delta.deltaField = delta
display.visualizations.custom.worldcup_dashboard.single_value_delta.title = Active Customers
display.visualizations.custom.worldcup_dashboard.single_value_delta.align = left
display.visualizations.custom.worldcup_dashboard.single_value_delta.valuePrefix =
display.visualizations.custom.worldcup_dashboard.single_value_delta.valueSuffix = K
display.visualizations.custom.worldcup_dashboard.single_value_delta.groupThousands = true
display.visualizations.custom.worldcup_dashboard.single_value_delta.valueColor = #ffffff
display.visualizations.custom.worldcup_dashboard.single_value_delta.deltaSuffix = ×
display.visualizations.custom.worldcup_dashboard.single_value_delta.deltaText = vs. matchday baseline
display.visualizations.custom.worldcup_dashboard.single_value_delta.showArrow = true
display.visualizations.custom.worldcup_dashboard.single_value_delta.higherIsBetter = true
display.visualizations.custom.worldcup_dashboard.single_value_delta.upColor = #61D27E
display.visualizations.custom.worldcup_dashboard.single_value_delta.downColor = #D5225D
display.visualizations.custom.worldcup_dashboard.single_value_delta.showSparkline = true
display.visualizations.custom.worldcup_dashboard.single_value_delta.sparklineColor = #61D27E
display.visualizations.custom.worldcup_dashboard.single_value_delta.sparklineFill = true
display.visualizations.custom.worldcup_dashboard.single_value_delta.fillColor = transparent
display.visualizations.custom.worldcup_dashboard.single_value_delta.showBorder = true
display.visualizations.custom.worldcup_dashboard.single_value_delta.borderColor = #2A3566
display.visualizations.custom.worldcup_dashboard.single_value_delta.cornerRadius = 16

[Top Markets - Logins by Country]
search = index=prod_session action=login brand IN (paddypower, betfair)\
| eval country = coalesce(country, "International")\
| stats count by country\
| sort - count
dispatch.earliest_time = -60m
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = worldcup_dashboard.top_markets
display.visualizations.custom.worldcup_dashboard.top_markets.countryField = country
display.visualizations.custom.worldcup_dashboard.top_markets.valueField = count
display.visualizations.custom.worldcup_dashboard.top_markets.title = Customer Reach · Top Markets
display.visualizations.custom.worldcup_dashboard.top_markets.tagText = by active users
display.visualizations.custom.worldcup_dashboard.top_markets.topN = 6
display.visualizations.custom.worldcup_dashboard.top_markets.showShare = true
display.visualizations.custom.worldcup_dashboard.top_markets.abbreviate = true
display.visualizations.custom.worldcup_dashboard.top_markets.barColor1 = #0285FF
display.visualizations.custom.worldcup_dashboard.top_markets.barColor2 = #CCE5FF
display.visualizations.custom.worldcup_dashboard.top_markets.valueColor = #ffffff
display.visualizations.custom.worldcup_dashboard.top_markets.tagColor = #F8CD4B
display.visualizations.custom.worldcup_dashboard.top_markets.fillColor = transparent
display.visualizations.custom.worldcup_dashboard.top_markets.showBorder = true
display.visualizations.custom.worldcup_dashboard.top_markets.borderColor = #2A3566
display.visualizations.custom.worldcup_dashboard.top_markets.cornerRadius = 16
