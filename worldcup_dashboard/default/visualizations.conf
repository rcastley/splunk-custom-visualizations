# Custom visualization stanzas are merged here by vizs/build.sh

[single_value_delta]
label = Single Value + Delta
description = Single value with optional delta badge and sparkline.
default_height = 140
allow_user_selection = true
disabled = 0
search_fragment = | timechart span=5m latest(value) as value

[top_markets]
label = Top Markets
description = Ranked country markets with flags, bars, values and share %.
default_height = 320
allow_user_selection = true
disabled = 0
search_fragment = | stats count by country | sort - count
