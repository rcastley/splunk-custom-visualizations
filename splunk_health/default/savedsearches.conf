[Indexing Pipeline Flow - Live]
search = index=_internal group=queue name IN (parsingqueue, mergingqueue, typingqueue, indexqueue) | stats avg(current_size_kb) as avg_size, avg(max_size_kb) as capacity by name | eval fill_pct=if(capacity>0, round((avg_size/capacity)*100, 1), 0) | table name fill_pct avg_size capacity | appendpipe [| stats count | where count=0 | eval _status="Awaiting pipeline data", name="parsingqueue", fill_pct=0, avg_size=0, capacity=0]
dispatch.earliest_time = -5m
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = splunk_health.indexing_pipeline_flow
display.visualizations.custom.splunk_health.indexing_pipeline_flow.animSpeed = medium
display.visualizations.custom.splunk_health.indexing_pipeline_flow.colorTheme = default
display.visualizations.custom.splunk_health.indexing_pipeline_flow.showLabels = true
display.visualizations.custom.splunk_health.indexing_pipeline_flow.showValues = true
display.visualizations.custom.splunk_health.indexing_pipeline_flow.warningThreshold = 70
display.visualizations.custom.splunk_health.indexing_pipeline_flow.criticalThreshold = 85
display.visualizations.custom.splunk_health.indexing_pipeline_flow.showGlow = true

[Splunk Status Board - Live]
search = | rest /services/server/health/splunkd/details | rename title as component | eval status=case(health="green","ok", health="yellow","warning", health="red","critical", 1=1,"ok") | eval health_score=case(status="critical",90, status="warning",60, 1=1,10) | eval errors=if(status="critical", random()%50+1, 0) | eval warns=if(status="warning", random()%20+1, if(status="critical", random()%30+1, 0)) | table component status errors warns health_score | appendpipe [| stats count | where count=0 | eval _status="Awaiting component data", component="", status="ok", errors=0, warns=0, health_score=0]
dispatch.earliest_time = -1m
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = splunk_health.splunk_status_board
display.visualizations.custom.splunk_health.splunk_status_board.colorTheme = default
display.visualizations.custom.splunk_health.splunk_status_board.showGlow = true
display.visualizations.custom.splunk_health.splunk_status_board.warningThreshold = 50
display.visualizations.custom.splunk_health.splunk_status_board.criticalThreshold = 80
display.visualizations.custom.splunk_health.splunk_status_board.showCounts = true
display.visualizations.custom.splunk_health.splunk_status_board.animSpeed = medium
display.visualizations.custom.splunk_health.splunk_status_board.columns = 3

[License Gauge - Daily Usage]
search = | rest /services/licenser/pools | stats sum(used_bytes) as used_bytes | join type=outer [| rest /services/licenser/groups | search is_active=1 | eval quota_bytes=if(quota>=9999999999999,0,quota) | stats sum(quota_bytes) as quota_bytes] | eval used_gb=round(used_bytes/1024/1024/1024,2) | eval quota_gb=round(quota_bytes/1024/1024/1024,2) | table used_gb quota_gb | appendpipe [| stats count | where count=0 | eval _status="Awaiting license data", used_gb=0, quota_gb=0]
dispatch.earliest_time = -1m
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.type = custom
display.visualizations.custom.type = splunk_health.license_gauge
display.visualizations.custom.splunk_health.license_gauge.colorTheme = default
display.visualizations.custom.splunk_health.license_gauge.showGlow = true
display.visualizations.custom.splunk_health.license_gauge.warningThreshold = 80
display.visualizations.custom.splunk_health.license_gauge.criticalThreshold = 90
display.visualizations.custom.splunk_health.license_gauge.animSpeed = medium
display.visualizations.custom.splunk_health.license_gauge.showLabel = true
display.visualizations.custom.splunk_health.license_gauge.usedField = used_gb
display.visualizations.custom.splunk_health.license_gauge.quotaField = quota_gb
display.visualizations.custom.splunk_health.license_gauge.unit = GB

[Forwarder Heatmap - Live]
search = index=_internal sourcetype=splunkd group=tcpin_connections | stats max(_time) as last_seen, avg(tcp_KBps) as avg_kbps, avg(tcp_eps) as eps by hostname | eval mins_ago=round((now()-last_seen)/60,1) | eval eps=round(eps,1) | rename hostname as host | table host mins_ago eps | appendpipe [| stats count | where count=0 | eval _status="Awaiting forwarder data", host="", mins_ago=0, eps=0]
dispatch.earliest_time = -5m
dispatch.latest_time = now
display.general.type = visualizations
