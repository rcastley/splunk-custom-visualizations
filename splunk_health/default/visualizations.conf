[indexing_pipeline_flow]
label = Indexing Pipeline Flow
description = Animated visualization of Splunk indexing pipeline queues with glass tube fill levels and flow particles
default_height = 350
allow_user_selection = true
disabled = 0
search_fragment = index=_internal group=queue | stats latest(current_size) as avg_size by name

[splunk_status_board]
label = Splunk Status Board
description = Monitor component health with animated glass tiles and threshold colors
default_height = 400
allow_user_selection = true
disabled = 0
search_fragment = | rest /services/server/health/splunkd/details | table component status errors warns health_score

[license_gauge]
label = License Gauge
description = Track daily license consumption against quota with an animated arc gauge
default_height = 400
allow_user_selection = true
disabled = 0
search_fragment = | rest /services/licenser/pools | stats sum(used_bytes) as used_bytes

[forwarder_heatmap]
label = Forwarder Heatmap
description = Glass-themed heatmap grid showing forwarder health and staleness
default_height = 400
allow_user_selection = true
disabled = 0
search_fragment = | stats max(_time) as last_seen by hostname | eval mins_ago=round((now()-last_seen)/60,1) | table host mins_ago eps

[resource_gauge]
label = Resource Gauge
description = Concentric arc gauges showing CPU, memory, and disk utilization
default_height = 350
allow_user_selection = true
disabled = 0
search_fragment = | stats latest(data.cpu_user_pct) as cpu_user latest(data.mem_used) as mem_used

[search_activity]
label = Search Activity
description = Monitor search slot utilization with a stacked glass tank gauge
default_height = 250
allow_user_selection = true
disabled = 0
search_fragment = | rest /services/server/status/resource-usage/splunk-processes

[index_storage]
label = Index Storage
description = Glass tank grid showing index sizes with hot/warm/cold data layers
default_height = 400
allow_user_selection = true
disabled = 0
search_fragment = | rest /services/data/indexes | eval sizeGB=round(currentDBSizeMB/1024,2) | table title sizeGB hotGB warmGB coldGB

[scheduler_health]
label = Scheduler Health
description = Display scheduler success, skip rate, and runtime as animated glass tubes
default_height = 300
allow_user_selection = true
disabled = 0
search_fragment = | stats count as total, count(eval(status="skipped")) as skipped
