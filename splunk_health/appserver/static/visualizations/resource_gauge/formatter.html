<form class="splunk-formatter-section" section-label="Gauge Settings">
    <splunk-control-group label="Colour Theme" help="Visual theme for the gauge arcs">
        <splunk-select name="{{VIZ_NAMESPACE}}.colorTheme" value="default">
            <option value="default">Default</option>
            <option value="dark">Dark</option>
            <option value="neon">Neon</option>
        </splunk-select>
    </splunk-control-group>
    <splunk-control-group label="Animation Speed" help="Speed of particles flowing along arcs">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.animSpeed" value="medium">
            <option value="slow">Slow</option>
            <option value="medium">Medium</option>
            <option value="fast">Fast</option>
        </splunk-radio-input>
    </splunk-control-group>
    <splunk-control-group label="Show Labels" help="Display metric labels in the center area">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.showLabels" value="true">
            <option value="true">Yes</option>
            <option value="false">No</option>
        </splunk-radio-input>
    </splunk-control-group>
    <splunk-control-group label="Show Glow Effect" help="Glowing highlight on high-usage arcs">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.showGlow" value="true">
            <option value="true">Yes</option>
            <option value="false">No</option>
        </splunk-radio-input>
    </splunk-control-group>
</form>
<form class="splunk-formatter-section" section-label="Thresholds">
    <splunk-control-group label="Warning Threshold" help="Percentage at which arc turns yellow (0-100)">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.warningThreshold" value="70">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Critical Threshold" help="Percentage at which arc turns red (0-100)">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.criticalThreshold" value="85">
        </splunk-text-input>
    </splunk-control-group>
</form>
<form class="splunk-formatter-section" section-label="Field Names">
    <splunk-control-group label="CPU Field" help="SPL field name for CPU utilization">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.cpuField" value="cpu_pct">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Memory Field" help="SPL field name for memory utilization">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.memField" value="mem_pct">
        </splunk-text-input>
    </splunk-control-group>
    <splunk-control-group label="Disk Field" help="SPL field name for disk I/O utilization">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.diskField" value="disk_pct">
        </splunk-text-input>
    </splunk-control-group>
</form>
